# HORA + Isaac Gym: use Python 3.8 (Isaac Gym Preview 4 / upstream docs).
# Isaac Gym itself is NOT installed by this file — after `conda env create`,
# extract Preview 4.0 and run: pip install -e isaacgym/python
#
# Create:  conda env create -f environment.yml
# Update:  conda env update -f environment.yml --prune
name: hora
channels:
  - pytorch
  - conda-forge
dependencies:
  - python=3.8
  - pip
  - gdown
  - urllib3
  # Match docs/install.md (adjust if your CUDA driver needs a newer toolkit).
  - pytorch=1.10.1
  - torchvision=0.11.2
  - torchaudio=0.10.1
  - cudatoolkit=10.2
  - pip:
    - -r requirements.txt
